<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Korea Map Guess</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=b60039415ec75bb9e563da272704f669&autoload=false"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <main>
        <div id="roadview" aria-label="Kakao roadview panorama"></div>

        <section id="control-panel" aria-label="Guess controls">
            <div id="map" aria-label="Guess map"></div>

            <p id="answer-text">Loading a place...</p>
            <p id="difficulty-text">Difficulty: Easy</p>

            <div class="buttons">
                <button id="submit-button" type="button">Submit answer</button>
                <button class="difficulty-button active" type="button" data-difficulty="Easy">Easy</button>
                <button class="difficulty-button" type="button" data-difficulty="Medium">Medium</button>
                <button class="difficulty-button" type="button" data-difficulty="Hard">Hard</button>
            </div>
        </section>
    </main>
</body>
</html>
